<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilfredo Valle — wilfredovalle.ai</title>
  <meta name="description" content="Something is coming. Wilfredo Valle — San Francisco." />
  <meta property="og:title" content="Wilfredo Valle — Coming Soon" />
  <meta property="og:description" content="Something is coming. Wilfredo Valle — San Francisco." />
  <meta property="og:url" content="https://wilfredovalle.ai" />
  <meta property="og:type" content="website" />
  <link rel="canonical" href="https://wilfredovalle.ai" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>

  <div id="js-intro" class="word-intro" aria-live="polite" aria-label="Teaser">
    <canvas class="word-intro__canvas" aria-hidden="true"></canvas>
    <span class="word-intro__display"></span><span class="word-intro__cursor">|</span>

    <div class="teaser-audio-bar">
      <button class="teaser-mute" id="js-mute" aria-label="Mute music">♫</button>
      <div class="teaser-audio-label">
        <span>Cascade</span>
        <span>by wilfredo-ai</span>
        <span>© 2026 wilfredovalle.ai</span>
      </div>
    </div>

    <!-- End card: monogram + March 2026, fades in after "Coming Soon" -->
    <div id="js-endcard" class="teaser-endcard">
      <div class="logo-ring">
        <a class="monogram monogram--landing" href="https://wilfredovalle.ai" aria-label="Wilfredo Valle">
          <video muted playsinline id="js-mv">
            <source src="assets/animate-logo.webm" type="video/webm" />
            <source src="assets/animate-logov2.m4v" type="video/mp4" />
          </video>
          <img src="assets/monogram-logo.png" alt="Wilfredo Valle" class="logo-static" id="js-mi" />
        </a>
      </div>
      <div class="teaser-countdown" id="js-countdown">
        <span class="teaser-countdown__label">Launching</span>
        <div class="teaser-countdown__units">
          <div class="teaser-countdown__unit"><span id="js-cd-d">00</span><span>Days</span></div>
          <div class="teaser-countdown__sep">:</div>
          <div class="teaser-countdown__unit"><span id="js-cd-h">00</span><span>Hrs</span></div>
          <div class="teaser-countdown__sep">:</div>
          <div class="teaser-countdown__unit"><span id="js-cd-m">00</span><span>Min</span></div>
          <div class="teaser-countdown__sep">:</div>
          <div class="teaser-countdown__unit"><span id="js-cd-s">00</span><span>Sec</span></div>
        </div>
      </div>
    </div>
  </div>

  <style>
    /* Keep words on one line at all viewport widths */
    .word-intro__display,
    .word-intro__cursor {
      white-space: nowrap;
      font-size: clamp(1.6rem, 8vw, 8rem);
    }

    /* Slow fade for "Coming Soon" — teaser page only */
    .word-intro__display.is-farewell {
      transition: opacity 2000ms ease, text-shadow 2000ms ease;
      opacity: 0;
      text-shadow: none;
    }

    /* End card wrapper — centered, stacks monogram above credit */
    .teaser-endcard {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      transition: opacity 1500ms ease;
      pointer-events: none;
    }

    .teaser-endcard.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Countdown — centered inside endcard */
    .teaser-countdown {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
    }
    .teaser-countdown__label {
      font-family: var(--f-ui, 'DM Sans', sans-serif);
      font-size: clamp(0.45rem, 0.9vw, 0.55rem);
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(243, 241, 238, 0.22);
    }
    .teaser-countdown__units {
      display: flex;
      align-items: flex-start;
      gap: 0.4rem;
    }
    .teaser-countdown__unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .teaser-countdown__unit span:first-child {
      font-family: var(--f-ui, 'DM Sans', sans-serif);
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 200;
      letter-spacing: 0.04em;
      color: rgba(243, 241, 238, 0.55);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .teaser-countdown__unit span:last-child {
      font-family: var(--f-ui, 'DM Sans', sans-serif);
      font-size: clamp(0.38rem, 0.7vw, 0.48rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(243, 241, 238, 0.2);
    }
    .teaser-countdown__sep {
      font-family: var(--f-ui, 'DM Sans', sans-serif);
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      font-weight: 200;
      color: rgba(243, 241, 238, 0.18);
      padding-top: 0.05rem;
      line-height: 1;
    }

    /* Audio bar — fixed top-right, stacks mute button + track info */
    .teaser-audio-bar {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* Music toggle button */
    .teaser-mute {
      background: none;
      border: none;
      color: rgba(243, 241, 238, 0.3);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      transition: color 200ms;
      flex-shrink: 0;
    }
    .teaser-mute:hover { color: rgba(243, 241, 238, 0.7); }

    /* Track name + credit */
    .teaser-audio-label {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.1rem;
      font-family: var(--f-ui, 'DM Sans', sans-serif);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.2;
    }
    .teaser-audio-label span:nth-child(1) {
      font-size: clamp(0.55rem, 1.2vw, 0.7rem);
      color: rgba(243, 241, 238, 0.55);
    }
    .teaser-audio-label span:nth-child(2) {
      font-size: clamp(0.48rem, 1vw, 0.6rem);
      color: rgba(243, 241, 238, 0.35);
      letter-spacing: 0.06em;
    }
    .teaser-audio-label span:nth-child(3) {
      font-size: clamp(0.42rem, 0.9vw, 0.52rem);
      color: rgba(243, 241, 238, 0.22);
      letter-spacing: 0.05em;
    }

    /* "March 2026" credit text */
    .teaser-credit {
      display: block;
      text-align: center;
      padding-left: 0.35em; /* compensate for trailing letter-spacing so text is visually centered */
      font-family: var(--f-ui, 'DM Sans', sans-serif);
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(243, 241, 238, 0.45);
      white-space: nowrap;
    }
  </style>

  <script>
    (function () {
      'use strict';

      var intro   = document.getElementById('js-intro');
      var display = intro.querySelector('.word-intro__display');
      var cursor  = intro.querySelector('.word-intro__cursor');
      var canvas  = intro.querySelector('.word-intro__canvas');
      var ctx     = canvas.getContext('2d');

      // --- Matrix rain ---
      var FONT_SIZE = 14;
      var CHARS      = '01101001011010011011010110100101101001010110100110110101アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ';
      var NAME_CHARS = 'WILFREDOVALE';
      var drops, rainInterval;

      function initCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drops = new Array(Math.floor(canvas.width / FONT_SIZE)).fill(1);
      }

      function drawRain() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = FONT_SIZE + 'px monospace';

        for (var i = 0; i < drops.length; i++) {
          // 8% chance to inject a letter from the name with a random glow
          var isName = Math.random() < 0.08;
          var char = isName
            ? NAME_CHARS[Math.floor(Math.random() * NAME_CHARS.length)]
            : CHARS[Math.floor(Math.random() * CHARS.length)];

          if (isName) {
            ctx.shadowColor = '#00ff41';
            ctx.shadowBlur  = 10 + Math.random() * 25;
            ctx.fillStyle   = Math.random() < 0.4 ? '#ffffff' : '#ccffcc';
          } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle  = drops[i] === 1 ? '#ccffcc' : '#00ff41';
          }

          ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);
          ctx.shadowBlur = 0; // always reset so glow doesn't bleed

          if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }

      initCanvas();
      window.addEventListener('resize', initCanvas);
      rainInterval = setInterval(drawRain, 33); // ~30 fps

      // --- Typewriter ---
      var WORDS     = ['Creative', 'Designer', 'Technologist', 'Program Manager', 'AI Evangelist', 'Coming Soon'];
      var HOLD      = 900;
      var CLEAR_GAP = 220;
      var timer;

      // Randomised delay per character — mimics natural typing rhythm
      function charDelay(ch) {
        var base = ch === ' ' ? 180 : 120;          // spaces feel like a beat
        var jitter = Math.random() * 100;            // ±0–100ms natural variance
        var hesitate = Math.random() < 0.12 ? 200 : 0; // occasional micro-pause
        return base + jitter + hesitate;
      }

      function farewell() {
        clearTimeout(timer);
        // Hold 1000ms → fade "Coming Soon" out (2000ms)
        setTimeout(function () {
          display.classList.add('is-farewell');
          cursor.style.display = 'none';
          // After "Coming Soon" is gone → fade in endcard and play monogram video
          setTimeout(function () {
            var endcard = document.getElementById('js-endcard');
            var mv = document.getElementById('js-mv');
            var mi = document.getElementById('js-mi');
            endcard.classList.add('is-visible');
            if (mv) {
              mv.currentTime = 0;
              mv.play();
              mv.addEventListener('ended', function () {
                mv.style.opacity = '0';
                if (mi) { mi.style.opacity = '1'; }
              }, { once: true });
            }
          }, 2200); // slightly past the 2000ms fade-out
        }, 1000);
      }

      function typeWord(wordIdx, charIdx) {
        var word = WORDS[wordIdx];
        display.textContent = word.slice(0, charIdx);
        if (charIdx < word.length) {
          timer = setTimeout(function () { typeWord(wordIdx, charIdx + 1); }, charDelay(word[charIdx]));
        } else if (wordIdx === WORDS.length - 1) {
          farewell();
        } else {
          timer = setTimeout(function () {
            display.textContent = '';
            timer = setTimeout(function () { typeWord(wordIdx + 1, 0); }, CLEAR_GAP);
          }, HOLD);
        }
      }

      typeWord(0, 0);
    }());
  </script>

  <script>
    /* ── Tron / Matrix inspired generative soundtrack ────────────────────────
       Layers: deep bass drone · detuned sawtooth pad · Am7 arpeggio · shimmer
       All synthesised via Web Audio API — no audio files needed.
       Starts automatically; falls back to first user interaction if
       browser autoplay policy blocks it.
    ──────────────────────────────────────────────────────────────────────── */
    (function () {
      'use strict';

      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;

      var actx, masterGain, delay;
      var arpIdx = 0, arpTimer = null, arpStarted = false;
      var isMuted = false, isFading = false;

      // Am7 arpeggio: A2 C3 E3 G3 A3 G3 E3 C3 (dark, cinematic)
      var ARP   = [110, 130.81, 164.81, 196.00, 220.00, 196.00, 164.81, 130.81];
      var STEP  = 250; // 8th note at 120 BPM (ms)

      function build() {
        actx = new AC();

        // Master
        masterGain = actx.createGain();
        masterGain.gain.value = 0.5;
        masterGain.connect(actx.destination);

        // Feedback delay — simulates reverb
        delay = actx.createDelay(1.0);
        delay.delayTime.value = 0.38;
        var fb   = actx.createGain();   fb.gain.value = 0.42;
        var fbLp = actx.createBiquadFilter();
        fbLp.type = 'lowpass'; fbLp.frequency.value = 3000;
        delay.connect(fbLp); fbLp.connect(fb); fb.connect(delay);
        delay.connect(masterGain);

        // Route helper: split a node to dry (master) + wet (delay)
        function route(node, dry, wet) {
          if (dry) { var d = actx.createGain(); d.gain.value = dry; node.connect(d); d.connect(masterGain); }
          if (wet) { var w = actx.createGain(); w.gain.value = wet; node.connect(w); w.connect(delay); }
        }

        // ── Bass drone  A1 = 55 Hz, sine, tremolo LFO ──────────────────
        var bass  = actx.createOscillator(); bass.type = 'sine'; bass.frequency.value = 55;
        var bLFO  = actx.createOscillator(); bLFO.type = 'sine'; bLFO.frequency.value = 0.22;
        var bAmt  = actx.createGain(); bAmt.gain.value = 0.09;
        var bGain = actx.createGain(); bGain.gain.value = 0.28;
        bLFO.connect(bAmt); bAmt.connect(bGain.gain); // LFO → tremolo
        bass.connect(bGain); bGain.connect(masterGain);
        bass.start(); bLFO.start();

        // ── Pad  detuned sawtooth pairs at A2 + E3 + A3, lowpass swept ──
        var pFilt = actx.createBiquadFilter();
        pFilt.type = 'lowpass'; pFilt.frequency.value = 600; pFilt.Q.value = 2;

        var fLFO = actx.createOscillator(); fLFO.type = 'sine'; fLFO.frequency.value = 0.04;
        var fAmt = actx.createGain(); fAmt.gain.value = 450;  // sweep ±450 Hz
        fLFO.connect(fAmt); fAmt.connect(pFilt.frequency); fLFO.start();

        [[110, 110.5], [165, 165.4], [220, 220.7]].forEach(function (pair) {
          pair.forEach(function (f) {
            var o = actx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
            o.connect(pFilt); o.start();
          });
        });
        var pGain = actx.createGain(); pGain.gain.value = 0.08;
        pFilt.connect(pGain); route(pGain, 0.6, 0.4);

        // ── High shimmer  A5 = 880 Hz, mostly wet ──────────────────────
        var shim  = actx.createOscillator(); shim.type = 'sine'; shim.frequency.value = 880;
        var sGain = actx.createGain(); sGain.gain.value = 0.01;
        shim.connect(sGain); route(sGain, 0.05, 0.95);
        shim.start();

        // ── Arpeggio  Am7 pattern, square wave, 120 BPM 8th notes ──────
        function tick() {
          if (isFading) return; // let the fade finish cleanly — no new notes
          var f = ARP[arpIdx % ARP.length];
          var o = actx.createOscillator(); o.type = 'square'; o.frequency.value = f;
          var g = actx.createGain();
          g.gain.setValueAtTime(0, actx.currentTime);
          g.gain.linearRampToValueAtTime(0.08, actx.currentTime + 0.012);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + STEP / 1000 * 0.8);
          o.connect(g); route(g, 0.4, 0.6);
          o.start(); o.stop(actx.currentTime + STEP / 1000);
          arpIdx++;
          arpTimer = setTimeout(tick, STEP);
        }

        function startArp() {
          if (actx.state === 'running' && !arpStarted) {
            arpStarted = true;
            setTimeout(tick, 600);
          }
        }
        actx.onstatechange = startArp;
        startArp();
      }

      // ── Boot ────────────────────────────────────────────────────────────
      build();

      // Try immediate resume (works when page was reached via a click/link)
      actx.resume().catch(function () {});

      // Fallback: resume on first interaction
      ['click', 'touchstart', 'keydown'].forEach(function (evt) {
        document.addEventListener(evt, function () { actx.resume(); }, { once: true });
      });

      // ── Fade out at 1:50 → silence at 2:00 ─────────────────────────────
      setTimeout(function () {
        isFading = true;
        clearTimeout(arpTimer);
        masterGain.gain.setValueAtTime(isMuted ? 0 : 0.5, actx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, actx.currentTime + 10);
      }, 110000); // 110s + 10s fade = exactly 2:00

      // ── Mute toggle ─────────────────────────────────────────────────────
      var muteBtn = document.getElementById('js-mute');
      if (muteBtn) {
        muteBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          actx.resume(); // ensure running after interaction
          isMuted = !isMuted;
          masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.2);
          muteBtn.textContent = isMuted ? '♪' : '♫';
          muteBtn.setAttribute('aria-label', isMuted ? 'Unmute music' : 'Mute music');
        });
      }

    }());
  </script>

  <script>
    /* ── Countdown to March 31 2026 ─────────────────────────────────────── */
    (function () {
      var target = new Date(2026, 2, 31).getTime(); // March 31, 2026 midnight local
      var dEl = document.getElementById('js-cd-d');
      var hEl = document.getElementById('js-cd-h');
      var mEl = document.getElementById('js-cd-m');
      var sEl = document.getElementById('js-cd-s');
      function pad(n) { return n < 10 ? '0' + n : '' + n; }
      function tick() {
        var diff = target - Date.now();
        if (diff <= 0) { dEl.textContent = hEl.textContent = mEl.textContent = sEl.textContent = '00'; return; }
        dEl.textContent = pad(Math.floor(diff / 86400000));
        hEl.textContent = pad(Math.floor((diff % 86400000) / 3600000));
        mEl.textContent = pad(Math.floor((diff % 3600000) / 60000));
        sEl.textContent = pad(Math.floor((diff % 60000) / 1000));
      }
      tick();
      setInterval(tick, 1000);
    }());
  </script>

</body>
</html>
