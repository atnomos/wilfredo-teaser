  <style>

  <script>
    (function () {
      'use strict';

      var intro   = document.getElementById('js-intro');
      var display = intro.querySelector('.word-intro__display');
      var cursor  = intro.querySelector('.word-intro__cursor');
      var canvas  = intro.querySelector('.word-intro__canvas');
      var ctx     = canvas.getContext('2d');

      // --- Matrix rain ---
      var FONT_SIZE = 14;
      var CHARS      = '01101001011010011011010110100101101001010110100110110101アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ';
      var NAME_CHARS = 'WILFREDOVALE';
      var drops, rainInterval;

      function initCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        drops = new Array(Math.floor(canvas.width / FONT_SIZE)).fill(1);
      }

      function drawRain() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = FONT_SIZE + 'px monospace';

        // Slow sine wave oscillates between green (t=0) and red (t=1)
        var t      = (Math.sin(Date.now() / 4000) + 1) / 2;
        var rMain  = Math.floor(t * 220);
        var gMain  = Math.floor((1 - t) * 255);
        var rLight = Math.floor(t * 255 + (1 - t) * 204);
        var gLight = Math.floor((1 - t) * 255 + t * 204);
        var mainColor  = 'rgb(' + rMain  + ',' + gMain  + ',40)';
        var lightColor = 'rgb(' + rLight + ',' + gLight + ',204)';

        for (var i = 0; i < drops.length; i++) {
          // 8% chance to inject a letter from the name with a random glow
          var isName = Math.random() < 0.08;
          var char = isName
            ? NAME_CHARS[Math.floor(Math.random() * NAME_CHARS.length)]
            : CHARS[Math.floor(Math.random() * CHARS.length)];

          if (isName) {
            ctx.shadowColor = mainColor;
            ctx.shadowBlur  = 10 + Math.random() * 25;
            ctx.fillStyle   = Math.random() < 0.4 ? '#ffffff' : lightColor;
          } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle  = drops[i] === 1 ? lightColor : mainColor;
          }

          ctx.fillText(char, i * FONT_SIZE, drops[i] * FONT_SIZE);
          ctx.shadowBlur = 0; // always reset so glow doesn't bleed

          if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }

      initCanvas();
      window.addEventListener('resize', initCanvas);
      rainInterval = setInterval(drawRain, 33); // ~30 fps

      // --- Typewriter ---
      var WORDS     = ['By design.', 'With intent.', 'With AI.', 'Without permission.', 'Coming Soon'];
      var HOLD      = 950;
      var CLEAR_GAP = 180;
      var timer;
      var sub = document.getElementById('js-sub');

      // Natural character timing — slower, human-paced
      function charDelay(ch) {
        var base = ch === ' ' ? 200 : 130;
        var jitter = Math.random() * 90;
        var hesitate = Math.random() < 0.12 ? 200 : 0;
        return base + jitter + hesitate;
      }


      // Delete exactly N chars one at a time, then call callback
      function deleteNChars(n, callback) {
        if (n === 0) { callback(); return; }
        display.textContent = display.textContent.slice(0, -1);
        timer = setTimeout(function () { deleteNChars(n - 1, callback); }, 55 + Math.random() * 35);
      }

      // Type a decoy string then call callback
      function typeDecoy(decoy, charIdx, callback) {
        display.textContent = decoy.slice(0, charIdx);
        if (charIdx < decoy.length) {
          timer = setTimeout(function () { typeDecoy(decoy, charIdx + 1, callback); }, charDelay(decoy[charIdx]));
        } else {
          callback();
        }
      }

      function farewell() {
        clearTimeout(timer);
        setTimeout(function () {
          display.classList.add('is-farewell');
          cursor.style.display = 'none';
          if (sub) sub.classList.remove('is-visible'); // fade out "new website" with Coming Soon
          setTimeout(function () {
            var endcard = document.getElementById('js-endcard');
            var mv = document.getElementById('js-mv');
            endcard.classList.add('is-visible');
            if (mv) {
              mv.currentTime = 0;
              mv.play();
            }
          }, 2200);
        }, 1000);
      }

      function typeWord(wordIdx, charIdx, skipDecoy) {
        var word = WORDS[wordIdx];

        // "Without permission.": type "With permi", backspace to "With", then add "out permission."
        if (wordIdx === 3 && charIdx === 0 && !skipDecoy) {
          typeDecoy('With permi', 0, function () {
            timer = setTimeout(function () {
              deleteNChars(6, function () {
                timer = setTimeout(function () { typeWord(wordIdx, 4, true); }, 140);
              });
            }, 320);
          });
          return;
        }

        // Reveal "new website" label when Coming Soon begins
        if (wordIdx === WORDS.length - 1 && charIdx === 0 && sub) {
          sub.textContent = 'new website';
          sub.classList.add('is-visible');
        }

        display.textContent = word.slice(0, charIdx);
        if (charIdx < word.length) {
          timer = setTimeout(function () { typeWord(wordIdx, charIdx + 1, skipDecoy); }, charDelay(word[charIdx]));
        } else if (wordIdx === WORDS.length - 1) {
          farewell();
        } else {
          var periodPause = word[word.length - 1] === '.' ? 350 : 0;
          timer = setTimeout(function () {
            display.textContent = '';
            timer = setTimeout(function () { typeWord(wordIdx + 1, 0); }, CLEAR_GAP);
          }, HOLD + periodPause);
        }
      }

      typeWord(0, 0);
    }());
  </script>

  <script>
    /* ── Tron / Matrix inspired generative soundtrack ────────────────────────
       Layers: deep bass drone · detuned sawtooth pad · Am7 arpeggio · shimmer
       All synthesised via Web Audio API — no audio files needed.
       Starts automatically; falls back to first user interaction if
       browser autoplay policy blocks it.
    ──────────────────────────────────────────────────────────────────────── */
    (function () {
      'use strict';

      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;

      var actx, masterGain, delay;
      var arpIdx = 0, arpTimer = null, arpStarted = false;
      var isMuted = false, isFading = false;

      // Am7 arpeggio: A2 C3 E3 G3 A3 G3 E3 C3 (dark, cinematic)
      var ARP   = [110, 130.81, 164.81, 196.00, 220.00, 196.00, 164.81, 130.81];
      var STEP  = 250; // 8th note at 120 BPM (ms)

      function build() {
        actx = new AC();

        // Master
        masterGain = actx.createGain();
        masterGain.gain.value = 0.5;
        masterGain.connect(actx.destination);

        // Feedback delay — simulates reverb
        delay = actx.createDelay(1.0);
        delay.delayTime.value = 0.38;
        var fb   = actx.createGain();   fb.gain.value = 0.42;
        var fbLp = actx.createBiquadFilter();
        fbLp.type = 'lowpass'; fbLp.frequency.value = 3000;
        delay.connect(fbLp); fbLp.connect(fb); fb.connect(delay);
        delay.connect(masterGain);

        // Route helper: split a node to dry (master) + wet (delay)
        function route(node, dry, wet) {
          if (dry) { var d = actx.createGain(); d.gain.value = dry; node.connect(d); d.connect(masterGain); }
          if (wet) { var w = actx.createGain(); w.gain.value = wet; node.connect(w); w.connect(delay); }
        }

        // ── Bass drone  A1 = 55 Hz, sine, tremolo LFO ──────────────────
        var bass  = actx.createOscillator(); bass.type = 'sine'; bass.frequency.value = 55;
        var bLFO  = actx.createOscillator(); bLFO.type = 'sine'; bLFO.frequency.value = 0.22;
        var bAmt  = actx.createGain(); bAmt.gain.value = 0.09;
        var bGain = actx.createGain(); bGain.gain.value = 0.28;
        bLFO.connect(bAmt); bAmt.connect(bGain.gain); // LFO → tremolo
        bass.connect(bGain); bGain.connect(masterGain);
        bass.start(); bLFO.start();

        // ── Pad  detuned sawtooth pairs at A2 + E3 + A3, lowpass swept ──
        var pFilt = actx.createBiquadFilter();
        pFilt.type = 'lowpass'; pFilt.frequency.value = 600; pFilt.Q.value = 2;

        var fLFO = actx.createOscillator(); fLFO.type = 'sine'; fLFO.frequency.value = 0.04;
        var fAmt = actx.createGain(); fAmt.gain.value = 450;  // sweep ±450 Hz
        fLFO.connect(fAmt); fAmt.connect(pFilt.frequency); fLFO.start();

        [[110, 110.5], [165, 165.4], [220, 220.7]].forEach(function (pair) {
          pair.forEach(function (f) {
            var o = actx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
            o.connect(pFilt); o.start();
          });
        });
        var pGain = actx.createGain(); pGain.gain.value = 0.08;
        pFilt.connect(pGain); route(pGain, 0.6, 0.4);

        // ── High shimmer  A5 = 880 Hz, mostly wet ──────────────────────
        var shim  = actx.createOscillator(); shim.type = 'sine'; shim.frequency.value = 880;
        var sGain = actx.createGain(); sGain.gain.value = 0.01;
        shim.connect(sGain); route(sGain, 0.05, 0.95);
        shim.start();

        // ── Arpeggio  Am7 pattern, square wave, 120 BPM 8th notes ──────
        function tick() {
          if (isFading) return; // let the fade finish cleanly — no new notes
          var f = ARP[arpIdx % ARP.length];
          var o = actx.createOscillator(); o.type = 'square'; o.frequency.value = f;
          var g = actx.createGain();
          g.gain.setValueAtTime(0, actx.currentTime);
          g.gain.linearRampToValueAtTime(0.08, actx.currentTime + 0.012);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + STEP / 1000 * 0.8);
          o.connect(g); route(g, 0.4, 0.6);
          o.start(); o.stop(actx.currentTime + STEP / 1000);
          arpIdx++;
          arpTimer = setTimeout(tick, STEP);
        }

        function startArp() {
          if (actx.state === 'running' && !arpStarted) {
            arpStarted = true;
            setTimeout(tick, 600);
          }
        }
        actx.onstatechange = startArp;
        startArp();
      }

      // ── Boot ────────────────────────────────────────────────────────────
      build();

      // Try immediate resume (works when page was reached via a click/link)
      actx.resume().catch(function () {});

      // Fallback: resume on first interaction
      ['click', 'touchstart', 'keydown'].forEach(function (evt) {
        document.addEventListener(evt, function () { actx.resume(); }, { once: true });
      });

      // ── Fade out at 1:50 → silence at 2:00 ─────────────────────────────
      setTimeout(function () {
        isFading = true;
        clearTimeout(arpTimer);
        masterGain.gain.setValueAtTime(isMuted ? 0 : 0.5, actx.currentTime);
        masterGain.gain.linearRampToValueAtTime(0, actx.currentTime + 10);
      }, 110000); // 110s + 10s fade = exactly 2:00

      // ── Mute toggle ─────────────────────────────────────────────────────
      var muteBtn = document.getElementById('js-mute');
      if (muteBtn) {
        muteBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          actx.resume(); // ensure running after interaction
          isMuted = !isMuted;
          masterGain.gain.setTargetAtTime(isMuted ? 0 : 0.5, actx.currentTime, 0.2);
          muteBtn.textContent = isMuted ? '♪' : '♫';
          muteBtn.setAttribute('aria-label', isMuted ? 'Unmute music' : 'Mute music');
        });
      }

    }());
  </script>

  <script>
    /* ── Countdown to March 31 2026 ─────────────────────────────────────── */
    (function () {
      var target = new Date(2026, 2, 31).getTime(); // March 31, 2026 midnight local
      var dEl = document.getElementById('js-cd-d');
      var hEl = document.getElementById('js-cd-h');
      var mEl = document.getElementById('js-cd-m');
      var sEl = document.getElementById('js-cd-s');
      function pad(n) { return n < 10 ? '0' + n : '' + n; }
      function tick() {
        var diff = target - Date.now();
        if (diff <= 0) { dEl.textContent = hEl.textContent = mEl.textContent = sEl.textContent = '00'; return; }
        dEl.textContent = pad(Math.floor(diff / 86400000));
        hEl.textContent = pad(Math.floor((diff % 86400000) / 3600000));
        mEl.textContent = pad(Math.floor((diff % 3600000) / 60000));
        sEl.textContent = pad(Math.floor((diff % 60000) / 1000));
      }
      tick();
      setInterval(tick, 1000);
    }());
  </script>
